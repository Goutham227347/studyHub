{% extends 'base.html' %}
{% block title %}Notifications{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
  <h1 class="text-2xl font-bold mb-6">Notifications</h1>
  <div class="space-y-3">
    {% for n in notifications %}
    <a href="{{ n.link|default:'#' }}" class="glass-card p-4 block hover:border-purple-500/30 transition {% if not n.is_read %}border-l-4 border-l-purple-500{% endif %}">
      <p class="font-medium">{{ n.title }}</p>
      <p class="text-sm text-[var(--text-secondary)] mt-1">{{ n.message }}</p>
      <p class="text-xs text-[var(--text-muted)] mt-2">{{ n.created_at|timesince }} ago</p>
    </a>
    {% empty %}
    <div class="glass-card p-8 text-center text-[var(--text-muted)]">No notifications yet</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
