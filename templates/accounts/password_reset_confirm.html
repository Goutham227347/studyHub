{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="glass-card p-8">
    <h1 class="text-2xl font-bold mb-6">Set New Password</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="text-sm block mb-1">{{ field.label }}</label>
        <input type="password" name="{{ field.name }}" class="form-input" required>
      </div>
      {% endfor %}
      <button type="submit" class="btn-primary w-full py-3">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
